name: Manual App Deletion
on:
  workflow_dispatch:
    inputs:
      bundle_ids:
        description: 'Enter BundleIDs separated by commas (e.g. com.app1,com.app2)'
        required: true

jobs:
  delete-app:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Remove Apps from JSON
        run: |
          # 1. Get the input and swap commas for spaces
          IDS_INPUT="${{ github.event.inputs.bundle_ids }}"
          IDS_CLEAN=$(echo "$IDS_INPUT" | tr ',' ' ')
          
          if [ ! -f source.json ]; then
            echo "source.json not found."
            exit 1
          fi

          # 2. Loop through each ID and update the file in memory
          for ID in $IDS_CLEAN; do
            # Remove whitespace
            ID=$(echo "$ID" | xargs)
            echo "Processing removal for: $ID"
            
            jq --arg id "$ID" 'del(.apps[] | select(.bundleIdentifier == $id))' source.json > updated.json
            mv updated.json source.json
          done

      - name: Commit and Push
        run: |
          git config --global user.name "GitHub Action"
          git config --global user.email "action@github.com"
          git add source.json
          git commit -m "Bulk Removal: ${{ github.event.inputs.bundle_ids }}" || exit 0
          
          # Final safety pull/push
          git pull --rebase origin main
          git push origin HEAD:main
