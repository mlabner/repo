name: Update Feather Repo
on:
  release:
    types: [published, edited, created]

jobs:
  update-json:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Update JSON
        run: |
          # 1. Extract and Clean Metadata from Release Body
          BODY="${{ github.event.release.body }}"
          TARGET_ID=$(echo "$BODY" | grep -i "BundleID:" | awk '{print $2}' | tr -d '\r' | xargs)
          APP_NAME=$(echo "$BODY" | grep -i "Name:" | cut -d':' -f2- | sed 's/^[[:space:]]*//' | tr -d '\r' | xargs)
          
          # 2. Capture Asset Links
          DOWNLOAD_URL=$(echo '${{ toJson(github.event.release.assets) }}' | jq -r '.[] | select(.name | endswith(".ipa")) | .browser_download_url' | head -n 1)
          ICON_URL=$(echo '${{ toJson(github.event.release.assets) }}' | jq -r '.[] | select(.name | (endswith(".png") or endswith(".jpg") or endswith(".jpeg"))) | .browser_download_url' | head -n 1)
          SIZE=$(echo '${{ toJson(github.event.release.assets) }}' | jq -r '.[] | select(.name | endswith(".ipa")) | .size' | head -n 1 || echo "0")

          # 3. Validation
          if [ -z "$TARGET_ID" ] || [ -z "$APP_NAME" ]; then
            echo "Error: Metadata missing in Release Body."
            exit 1
          fi

          # 4. Ensure source.json is valid (Self-Healing)
          if [ ! -f source.json ] || [ ! -s source.json ]; then
            echo '{"name":"mlabner Repo","identifier":"com.mlabner.repo","apps":[]}' > source.json
          fi

          # 5. Prepare Variables
          VERSION="${{ github.event.release.tag_name }}"
          CLEAN_VERSION=$(echo $VERSION | sed 's/v//')
          DATE=$(date -u +"%Y-%m-%dT%H:%M:%SZ")

          # 6. Update or Add App Entry
          jq --arg id "$TARGET_ID" \
             --arg name "$APP_NAME" \
             --arg ver "$CLEAN_VERSION" \
             --arg url "$DOWNLOAD_URL" \
             --arg icon "${ICON_URL:-}" \
             --arg size "$SIZE" \
             --arg date "$DATE" \
             'if (.apps | any(.bundleIdentifier == $id)) then 
                (.apps[] | select(.bundleIdentifier == $id)) |= (.name = $name | .version = $ver | .downloadURL = $url | .size = ($size | tonumber) | .versionDate = $date | .iconURL = (if $icon != "" then $icon else .iconURL end))
              else 
                .apps = [{
                  "name": $name,
                  "bundleIdentifier": $id,
                  "developerName": "mlabner",
                  "version": $ver,
                  "versionDate": $date,
                  "downloadURL": $url,
                  "iconURL": $icon,
                  "localizedDescription": "Updated via GitHub Actions",
                  "size": ($size | tonumber),
                  "tintColor": "007AFF"
                }] + .apps 
              end' source.json > updated.json
          
          mv updated.json source.json

      - name: Commit and Push
        run: |
          git config --global user.name "GitHub Action"
          git config --global user.email "action@github.com"
          git add source.json
          git commit -m "Auto-update $TARGET_ID to ${{ github.event.release.tag_name }}" || exit 0
          # Fix for detached HEAD: Push specifically to the main branch
          git push origin HEAD:main
